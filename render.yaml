services:
  - type: web
    name: sohana
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /opt/render/project/src/sohana.db
    disk:
      name: sohana-db
      mountPath: /opt/render/project/src
      sizeGB: 1
